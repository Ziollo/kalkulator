<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projekt Kalkulatorów</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="funcion">
        <span class="funcion-mode"> Function </span>
        <label class="switch" for="function-toggle">
            <input type="checkbox" id="function-toggle" aria-label="Przełącz funkcje">
            <span class="slider"></span>
        </label>
    </div>
    <h1>Kalkulator</h1>
    <div class="toggle-container">
        <span class="mode-label"> Mode </span>
        <label class="switch" for="theme-toggle">
            <input type="checkbox" id="theme-toggle" aria-label="Przełącz tryb">
            <span class="slider"></span>
        </label>
    </div>
</header>

    <main class="container">

        <section id="simple-calculator" class="calc-box">
            <input id="results" readonly placeholder="0"> 

            <section id="keys"> 
                <div class="row">
                    <input type="button" value="C" class="x" onclick="delet()">
                    <input type="button" value="CE" class="x" onclick="beck()">
                    <input type="button" value="(" class="a" onclick="display('(')">
                    <input type="button" value=")" class="a" onclick="display(')')">
                </div>

                <div class="row">
                    <input type="button" value="√" class="a" onclick="squareRoot()">
                    <input type="button" value="+/-" class="a" onclick="sign()"> 
                    <input type="button" value="÷" class="a" onclick="display('/')">
                    <input type="button" value="×" class="a" onclick="display('*')">
                </div>
          
                <div class="row">
                    <input type="button" value="7" onclick="display('7')">
                    <input type="button" value="8" onclick="display('8')"> 
                    <input type="button" value="9" onclick="display('9')"> 
                    <input type="button" value="-" class="a" onclick="display('-')">
                </div>
          
                <div class="row">
                    <input type="button" value="4" onclick="display('4')">
                    <input type="button" value="5" onclick="display('5')"> 
                    <input type="button" value="6" onclick="display('6')"> 
                    <input type="button" value="+" class="a" onclick="display('+')"> 
                </div>
          
                <div class="row">
                    <input type="button" value="1" onclick="display('1')">
                    <input type="button" value="2" onclick="display('2')"> 
                    <input type="button" value="3" onclick="display('3')"  >
                    <input type="button" value="." onclick="display('.')">
                </div>

                <div class="row">
                    <input type="button" value="00"  onclick="display('00')"> 
                    <input type="button" value="0"  onclick="display('0')"> 
                    <input type="button" value="=" class="x" onclick="calc()">
                     
                </div>
            </section>
        </section>
    </main>
    <footer>
        © 2026 Kacper Ziółek / Wszystkie prawa zastrzeżone
</footer>

    <script src="js/script.js"></script>
</body>
</html>
